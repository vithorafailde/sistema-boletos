<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Sistema de Boletos</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f0f4f8;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card {
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 4px 24px rgba(0,0,0,.10);
  padding: 40px 36px 32px;
  width: 340px;
}
.logo {
  text-align: center;
  margin-bottom: 28px;
}
.logo h1 {
  font-size: 20px;
  font-weight: 700;
  color: #1e3a5f;
  margin-top: 10px;
}
.logo p {
  font-size: 12px;
  color: #64748b;
  margin-top: 4px;
}
label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 5px;
  margin-top: 16px;
}
input[type=text], input[type=password] {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  font-size: 14px;
  outline: none;
  transition: border-color .15s;
}
input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
.erro {
  background: #fee2e2;
  color: #dc2626;
  border-radius: 7px;
  padding: 8px 12px;
  font-size: 12px;
  margin-top: 14px;
}
button {
  width: 100%;
  margin-top: 24px;
  padding: 11px;
  background: #2563eb;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s;
}
button:hover { background: #1d4ed8; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div style="font-size:40px"></div>
    <h1>Sistema de Boletos</h1>
    <p>Gestão de locações</p>
  </div>
  <form method="POST">
    <label>Usuário</label>
    <input type="text" name="usuario" autocomplete="username" autofocus required>
    <label>Senha</label>
    <input type="password" name="senha" autocomplete="current-password" required>
    {% if erro %}
    <div class="erro">{{ erro }}</div>
    {% endif %}
    <button type="submit">Entrar</button>
  </form>
</div>
</body>
</html>
